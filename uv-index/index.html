<!DOCTYPE html>
<html lang="en-us">

<head>
  <meta charset="UTF-8">
  <!-- <link rel="manifest" href="manifest.json"> -->
  <script>
    if (typeof navigator.serviceWorker !== 'undefined') {
      navigator.serviceWorker.register('/sw.js')
    }
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#012169">
  <meta name="author" content="Paul Koepke" />
  <meta name="description" content="UV Index">
  <link id=" styles" rel="stylesheet" type="text/css" href="/styles_dark.css">
  <link href="/fonts/material-icons.css" rel="stylesheet">
  <link rel="icon" type="image/png" href="./sunny-icon-512.png">
  <link rel="apple-touch-icon" sizes="512x512" href="./sunny-icon-512.png">
  <meta property="og:title" content="UV Index" />
  <meta property="og:description" content="UV Index app." />
  <meta property="og:image" content="./sunny-icon-512.png" />
  <meta property="og:url" content="./index.html" />
</head>

<body>
  <h1 id="h1">
    <span class="material-icons">sunny</span>
    <a href="/" class="headerText nowrap">UV Index</a>
  </h1>
  <main>
    <div id="uvIndexResult" class="uv-bar-chart"></div>
    <p id="uvIndexPlaceholder" class="uv-placeholder">Use your location or enter a zip code to begin</p>
    <div id="controls" class="controls">
      <button id="useLocationBtn">Use my location</button>
      <input id="zipInput" type="text" maxlength="5" inputmode="numeric" pattern="\d*" placeholder="Enter ZIP code">
      <button id="searchByZipBtn">Search by ZIP</button>
    </div>
    <details>
      <summary>
        Acknowledgements and info
      </summary>
      <p>UV Index information courtesy of the EPA. <a href="https://www.epa.gov/sunsafety/uv-index-scale-0">Learn more about the UV index scale</a> </p>
      <p class="uv-placeholder">Geolocation to zip courtesy of BigDataCloud.</p>
    </details>
  </main>
</body>

<script>

  const useLocationBtn = document.getElementById('useLocationBtn');
  const zipInput = document.getElementById('zipInput');
  const searchByZipBtn = document.getElementById('searchByZipBtn');

  const uvIndexPlaceholder = document.getElementById('uvIndexPlaceholder');

  function showPlaceholder() {
    uvIndexPlaceholder.style.display = 'block';
  }

  function hidePlaceholder() {
    uvIndexPlaceholder.style.display = 'none';
  }

  function renderUVIndexResults(uvIndex) {
    const resultEl = document.getElementById('uvIndexResult');
    resultEl.innerHTML = '';
    hidePlaceholder();

    const entries = Object.entries(uvIndex)
      .map(([key, value]) => ({ key, value }))
      .filter(({ value }) => {
        const dateTime = value['DATE_TIME'];
        if (!dateTime) return false;

        const dateParts = dateTime.split(' ');
        const timeText = dateParts.length >= 2 ? dateParts.slice(-2).join(' ') : dateParts[0];
        if (!timeText) return false;

        if (timeText == '12 AM') { return false; }

        const upperTimeText = timeText.toUpperCase();
        const isPM = upperTimeText.endsWith('PM');
        const cleanedTime = isPM || upperTimeText.endsWith('AM')
          ? upperTimeText.slice(0, -2).trim()
          : upperTimeText;
        const [hourString] = cleanedTime.split(':');
        if (!hourString) return false;

        let hour = Number(hourString);
        if (Number.isNaN(hour)) return false;
        if (isPM && hour < 12) {
          hour += 12;
        }
        return hour >= 9 && hour <= 18;
      });

    if (entries.length === 0) {
      resultEl.innerHTML = '<p>No UV index data available between 9am and 6pm.</p>';
      return;
    }

    // Add row labels column right before the loops render the chart bars
    resultEl.innerHTML = `
      <div class="uv-bar-item uv-chart-labels">
        <div class="uv-bar-value">UV</div>
        <div class="uv-time-label">Time</div>
      </div>
    `;



    for (const { key, value } of entries) {
      const uvValue = Number(value['UV_VALUE']) || 0;
      const barHeight = Math.min(Math.max(uvValue, 0), 11) * 22 + 20;
      const dateTime = value['DATE_TIME'] || '';
      const dateParts = dateTime.split(' ');
      console.log(dateParts);
      let displayTime = parseInt(dateParts[1]);
      if (displayTime == 9) {
        displayTime = `9 AM`;
      }

      let colorClass = 'uv-bar--default';
      if (uvValue <= 2) {
        colorClass = 'uv-bar--low';
      } else if (uvValue >= 3 && uvValue <= 5) {
        colorClass = 'uv-bar--moderate';
      } else if (uvValue >= 6 && uvValue <= 7) {
        colorClass = 'uv-bar--high';
      } else if (uvValue >= 8 && uvValue <= 10) {
        colorClass = 'uv-bar--very-high';
      } else if (uvValue >= 11) {
        colorClass = 'uv-bar--extreme';
      }

      resultEl.innerHTML += `
        <div class="uv-bar-item">
          <div class="uv-bar ${colorClass}" style="height:${barHeight}px" title="UV ${uvValue}"></div>
          <div class="uv-bar-value">${uvValue}</div>
          <div class="uv-time-label">${displayTime}</div>
        </div>
      `;
    }
  }

  async function loadUVIndex() {
    try {
      const zipCode = await getUserZipCode();
      const uvIndex = await getEPAUVIndex({ zip: zipCode });
      renderUVIndexResults(uvIndex);
    } catch (err) {
      showPlaceholder();
    }
  }

  async function loadUVIndexByZip() {
    const zipCode = zipInput.value.trim();
    if (!zipCode) {
      alert('Please enter a ZIP code.');
      zipInput.focus();
      return;
    }

    try {
      const uvIndex = await getEPAUVIndex({ zip: zipCode });
      renderUVIndexResults(uvIndex);
    } catch (err) {
      console.error(err);
      alert('Could not get UV index for that ZIP code.');
    }
  }

  async function initializeUVIndexApp() {
    if (!navigator.permissions) {
      return;
    }

    try {
      const permissionStatus = await navigator.permissions.query({ name: 'geolocation' });
      if (permissionStatus.state === 'granted') {
        await loadUVIndex();
      }

      permissionStatus.onchange = () => {
        if (permissionStatus.state === 'granted') {
          loadUVIndex();
        }
      };
    } catch (error) {
      console.error('Permission check failed:', error);
    }
  }

  async function getUserZipCode() {
    // 1. Check if the browser supports the Geolocation API
    if (!navigator.geolocation) {
      throw new Error("Geolocation is not supported by your browser.");
    }

    // 2. Wrap the geolocation callback in a Promise so we can await it
    const getCoordinates = () => {
      return new Promise((resolve, reject) => {
        navigator.geolocation.getCurrentPosition(resolve, reject, {
          enableHighAccuracy: true,
          timeout: 5000,
          maximumAge: 0
        });
      });
    };

    try {
      // 3. Wait for the user to grant permission and get coordinates
      const position = await getCoordinates();
      const { latitude, longitude } = position.coords;

      // 4. Use a reverse geocoding API to find the ZIP code
      // Note: BigDataCloud provides free reverse geocoding up to a limit
      const apiUrl = `https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${latitude}&longitude=${longitude}&localityLanguage=en`;

      const response = await fetch(apiUrl);
      if (!response.ok) throw new Error("Failed to fetch location data.");

      const data = await response.json();

      // 5. Extract and return the ZIP code (postcode)
      if (data.postcode) {
        return data.postcode;
      } else {
        throw new Error("ZIP code not found for these coordinates.");
      }

    } catch (error) {
      // Handle user denying permission or API failures
      console.error("Error retrieving ZIP code:", error.message);
      throw error;
    }
  }

  /**
   * Fetches the UV Index for today from the EPA Envirofacts API.
   * @param {Object} location - The location object.
   * @param {string} [location.zip] - A 5-digit US ZIP code.
   * @param {string} [location.city] - The city name (required if zip is not provided).
   * @param {string} [location.state] - The 2-letter state abbreviation (required if city is provided).
   * @param {boolean} [hourly=false] - If true, returns hourly breakdown. If false, returns daily maximum.
   * @returns {Promise<Array|Object>} The UV index forecast data.
   */
  async function getEPAUVIndex(location, hourly = true) {
    let url = '';

    // 1. Determine the endpoint format based on provided location type
    if (location.zip) {
      const type = hourly ? 'getEnvirofactsUVHOURLY' : 'getEnvirofactsUVDAILY';
      url = `https://data.epa.gov/dmapservice/${type}/ZIP/${location.zip}/JSON`;
    } else if (location.city && location.state) {
      const type = hourly ? 'getEnvirofactsUVHOURLY' : 'getEnvirofactsUVDAILY';
      // Clean up city name for URLs (replace spaces with %20)
      const formattedCity = encodeURIComponent(location.city.trim());
      const formattedState = location.state.trim().toUpperCase();
      url = `https://data.epa.gov/dmapservice/${type}/CITY/${formattedCity}/STATE/${formattedState}/JSON`;
    } else {
      throw new Error('You must provide either a "zip" or both "city" and "state".');
    }

    try {
      const response = await fetch(url);

      if (!response.ok) {
        throw new Error(`EPA API error: ${response.status} ${response.statusText}`);
      }

      const data = await response.json();
      return data;
    } catch (error) {
      console.error('Failed to fetch UV index:', error);
      throw error;
    }
  }

  // --- How to use it ---
  // (Must be triggered by a user action like a button click due to browser security)
  useLocationBtn.addEventListener('click', loadUVIndex);
  searchByZipBtn.addEventListener('click', loadUVIndexByZip);
  zipInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
      loadUVIndexByZip();
    }
  });

  initializeUVIndexApp();

</script>

<style>
  #controls.controls {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
    /* Adds breathing room between elements */

    display: flex;

    align-items: center;
    justify-content: center;
    width: 100%;
    margin: 1rem 0;
  }

    width: 100%;
    text-align: center;
    cursor: pointer;
  }

  #uvIndexResult.uv-bar-chart {
    display: flex;
    flex-wrap: nowrap;
    gap: 0.65rem;
    align-items: flex-end;
    justify-content: center;
    padding: 1rem 0;
    margin: 1rem auto;
    min-height: 15rem;
  }

  .uv-bar-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 1rem;
    flex-shrink: 0;
  }

  /* Specific styles for the label row */
  .uv-chart-labels {
    width: auto !important;
    margin-right: 0.5rem;
    align-items: flex-end;
  }

  .uv-chart-labels .uv-bar-value,
  .uv-chart-labels .uv-time-label {
    font-weight: 500;
    opacity: 0.6;
    text-transform: uppercase;
    font-size: 0.75rem;
  }



  .uv-bar-label {
    font-size: 0.4rem;
    text-align: center;
    margin-bottom: 0.5rem;
    line-height: 1.2;
  }

  .uv-bar {
    width: 100%;
    max-width: 4.5rem;
    background: linear-gradient(to top, #9e9e9e 0%, #bdbdbd 100%);
    border-radius: 0.75rem 0.75rem 0 0;
    box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.16), 0 8px 16px rgba(0, 0, 0, 0.12);
    transition: height 0.2s ease, background 0.2s ease;
    min-height: 20px;
  }

  .uv-bar--low {
    background: linear-gradient(to top, #2e7d32 0%, #66bb6a 100%);
  }

  .uv-bar--moderate {
    background: linear-gradient(to top, #f9a825 0%, #ffee58 100%);
  }

  .uv-bar--high {
    background: linear-gradient(to top, #ef6c00 0%, #ffb74d 100%);
  }

  .uv-placeholder {
    margin: 0 auto;
    max-width: 28rem;
    text-align: center;
    font-size: 1rem;
    line-height: 1.5;
  }

  .uv-bar--very-high {
    background: linear-gradient(to top, #d32f2f 0%, #f44336 100%);
  }

  .uv-bar--extreme {
    background: linear-gradient(to top, #6a1b9a 0%, #9c27b0 100%);
  }

  .uv-bar-value {
    margin-top: 0.5rem;
    font-weight: 700;
    font-size: 0.95rem;
  }

  .uv-time-label {
    margin-top: 0.25rem;
    font-size: 0.78rem;
    text-align: center;
    line-height: 1.1;
    white-space: nowrap;
  }

  #uvIndexResult.uv-bar-chart {
    gap: 0.4rem;
    min-height: 12rem;
  }

  .uv-bar {
    max-width: 1rem;
  }
</style>

</html>
